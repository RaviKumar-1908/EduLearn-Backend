# ================================================================
#  Notification Service – PROD Profile
# ================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/lms_notification_db?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# ── Mail (Real SMTP) ─────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@lms.com

# ── Redis ────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.password=${REDIS_PASS:}

logging.level.com.lms.notification=WARN
