# ================================================================
#  Notification Service – Default / Common Properties
# ================================================================
spring.application.name=notification-service
server.port=8089

# ── Active Profile (override in CI / prod) ──────────────────────
spring.profiles.active=dev

# ── Database ────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lms_notification_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Eureka Client ───────────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ── Actuator ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Notification Service
info.app.version=1.0.0

# ── Redis Cache ───────────────────────────────────────────────
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.redis.time-to-live=300000

# ── RabbitMQ ────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000ms

# RabbitMQ Queue / Exchange Names
app.rabbitmq.exchange=lms.events.exchange
app.rabbitmq.queue.enrollment=enrollment.notification.queue
app.rabbitmq.queue.payment=payment.notification.queue
app.rabbitmq.queue.quiz=quiz.notification.queue
app.rabbitmq.queue.certificate=certificate.notification.queue
app.rabbitmq.queue.course=course.notification.queue
app.rabbitmq.queue.auth=auth.notification.queue
app.rabbitmq.queue.discussion=discussion.notification.queue
app.rabbitmq.queue.lesson=lesson.notification.queue
app.rabbitmq.queue.progress=progress.notification.queue
app.rabbitmq.queue.email.general=general.email.queue
app.rabbitmq.queue.email.auth=auth.email.queue
app.rabbitmq.queue.email.purchase=purchase.email.queue
app.rabbitmq.queue.email.instructor=instructor.email.queue
app.rabbitmq.exchange.certificate=lms.certificate.exchange

# ── SMTP / Email Configuration ──────────────────────────────────
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true

# ── JWT (shared secret – must match Auth-Service) ───────────────
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Swagger / OpenAPI ───────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false


# ── Logging ─────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.lms.notification=DEBUG
logging.file.name=logs/notification-service.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.level.org.springframework.security=DEBUG
