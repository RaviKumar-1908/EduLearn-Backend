# ============================================================
#  Progress Service – DEV Profile
# ============================================================

# ── DataSource (MySQL) ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/lms_progress_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ── Redis ────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── RabbitMQ ─────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ── Logging ──────────────────────────────────────────────────
logging.level.com.lms.progress=DEBUG
logging.level.org.springframework.security=DEBUG
