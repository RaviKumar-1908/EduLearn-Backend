# ============================================================
#  Progress Service – PROD Profile
#  Sensitive values should be supplied via environment variables
# ============================================================

# ── DataSource (MySQL) ──────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://prod-db-host:3306/lms_progress_db?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:produser}
spring.datasource.password=${DB_PASSWORD:prodpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ── Redis ────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:prod-redis-host}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── RabbitMQ ─────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:prod-rabbit-host}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:lmsuser}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:lmspassword}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.lms.progress=INFO
logging.level.org.springframework.security=WARN
