# ============================================================
#  Progress Service – Default Application Properties
#  Active profile is set per environment: dev | prod
# ============================================================

spring.application.name=progress-service
server.port=8087

# Activate profile: override via -Dspring.profiles.active=dev|prod
spring.profiles.active=dev

# ============================================================
#  Database (MySQL)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lms_progress_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# ============================================================
#  Eureka Client
# ============================================================
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ============================================================
#  RabbitMQ
# ============================================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# ============================================================
#  Redis
# ============================================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.cache.type=redis

# ============================================================
#  JWT  (must match Auth Service secret)
# ============================================================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ============================================================
#  Swagger / SpringDoc
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false


# ============================================================
#  Actuator (Health Monitoring)
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ============================================================
#  Logging
# ============================================================
logging.config=classpath:logback-spring.xml
logging.level.com.lms=DEBUG
logging.level.org.springframework.security=DEBUG
