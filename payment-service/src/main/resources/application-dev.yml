# ─────────────────────────────────────────────────────────────────────────────
# DEV Profile — uses local MySQL and Redis
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lms_payment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

logging:
  level:
    com.lms.payment: DEBUG
    org.springframework.web: INFO
