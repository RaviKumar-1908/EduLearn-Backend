# ─────────────────────────────────────────────────────────────────────────────
# PROD Profile — values injected via environment variables / Kubernetes secrets
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: ${PROD_DB_URL}
    username: ${PROD_DB_USER}
    password: ${PROD_DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

logging:
  level:
    com.lms.payment: WARN
    root: ERROR
