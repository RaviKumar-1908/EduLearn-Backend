  # ───────────────── FRONTEND ─────────────────

  frontend:
    image: ravikumar0192/frontend:latest
    container_name: lms-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  mysql_data: