      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}

      JWT_SECRET: ${JWT_SECRET}

      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS}

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}

  enrollment-service:
    image: ravikumar0192/enrollment-service:latest
    container_name: lms-enrollment
    restart: always
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${ENROLLMENT_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}

      JWT_SECRET: ${JWT_SECRET}

      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS}

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}

  payment-service:
