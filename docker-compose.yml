    restart: always

  discussion-service:
    build: ./discussion-service
    container_name: lms-discussion
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${DISCUSSION_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:+UseSerialGC"
    restart: always

  admin-server:
    build: ./admin-server
    container_name: lms-admin
    ports:
      - "9090:9090"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms128m -Xmx384m -XX:+UseSerialGC"
    restart: always

volumes:
  mysql_data:
