services:

  # ───────────────── INFRASTRUCTURE ─────────────────

  mysql:
    image: mysql:8.0
    container_name: lms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: lms-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lms-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ───────────────── CORE SERVICES ─────────────────

  eureka-server:
    image: ravikumar0192/eureka-server:latest
    container_name: lms-eureka
    restart: always
    ports:
      - "8761:8761"
    environment:
      JAVA_OPTS: ${JAVA_OPTS}

  api-gateway:
    image: ravikumar0192/api-gateway:latest
    container_name: lms-gateway
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_REDIS_HOST: ${REDIS_HOST}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}

  admin-server:
    image: ravikumar0192/admin-server:latest
    container_name: lms-admin
    restart: always
    ports:
      - "9090:9090"
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}

  # ───────────────── BUSINESS SERVICES ─────────────────

  auth-service:
    image: ravikumar0192/auth-service:latest
    container_name: lms-auth
    restart: always
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${AUTH_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS}

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}

  course-service:
    image: ravikumar0192/course-service:latest
    container_name: lms-course
    restart: always
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${COURSE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}

      JWT_SECRET: ${JWT_SECRET}

      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS}

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}

  lesson-service:
    image: ravikumar0192/lesson-service:latest
    container_name: lms-lesson
    restart: always
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: ${LESSON_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_ZONE}

      JWT_SECRET: ${JWT_SECRET}

      GROQ_API_KEY: ${GROQ_API_KEY}

      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS}

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      JAVA_OPTS: ${JAVA_OPTS}

  assessment-service:
